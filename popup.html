<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Métricas do Usuário Azure</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="loadingOverlay" class="loading-overlay hidden" aria-hidden="true">
      <span class="loading-spinner" aria-label="Carregando"></span>
    </div>

    <div id="confirmationOverlay" class="confirmation-overlay hidden" aria-hidden="true">
      <div id="confirmationDialog" class="confirmation-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmationTitle" aria-describedby="confirmationDescription">
        <h3 id="confirmationTitle" class="confirmation-title">Confirmar ação</h3>
        <p id="confirmationDescription" class="confirmation-description">Deseja continuar?</p>
        <div class="confirmation-actions">
          <button id="confirmationCancelButton" type="button" class="confirmation-cancel-button">Não</button>
          <button id="confirmationConfirmButton" type="button" class="confirmation-confirm-button">Sim</button>
        </div>
      </div>
    </div>

    <main class="container">
      <section id="initialView" class="view">
        <div class="initial-header">
          <h1>Métricas do Usuário Azure</h1>
          <div class="initial-header-actions">
            <button id="refreshMetricsButton" type="button" class="settings-icon-button refresh-icon-button" aria-label="Atualizar sprints e métricas" title="Atualizar sprints e métricas">
              &#x21bb;
            </button>
            <button id="settingsButton" type="button" class="settings-icon-button" aria-label="Configurações" title="Configurações">
              &#9881;
            </button>
          </div>
        </div>

        <div class="controls-row">
          <div class="field-group field-sprint">
            <label for="sprintSelect">Sprint</label>
            <select id="sprintSelect"></select>
          </div>

          <div class="field-group field-toggle">
            <label for="includeCurrentDayToggle">Considerar dia atual</label>
            <label class="switch" for="includeCurrentDayToggle">
              <input id="includeCurrentDayToggle" type="checkbox" checked />
              <span class="switch-slider"></span>
            </label>
          </div>
        </div>

        <section id="result" class="result hidden" aria-live="polite"></section>

        <button id="recentButton" type="button">Alterações recentes</button>
        <button id="criticalPendingButton" type="button">Análises críticas pendentes</button>
      </section>

      <section id="tokenSetupView" class="view hidden">
        <div class="changes-header">
          <button id="backFromTokenButton" type="button" class="back-arrow hidden" aria-label="Voltar para configurações">
            <span class="back-arrow-icon">➜</span>
          </button>
          <h2>Cadastro de Token</h2>
        </div>

        <div class="field-group">
          <label for="tokenNameInput">Nome do token</label>
          <input id="tokenNameInput" type="text" placeholder="Ex.: PAT Azure DevOps" />
        </div>

        <div class="field-group">
          <label for="tokenValueInput">Valor do token (PAT)</label>
          <input id="tokenValueInput" type="password" placeholder="Cole aqui o PAT" />
        </div>

        <button id="saveTokenButton" type="button">Salvar token</button>
        <section id="tokenStatus" class="result hidden" aria-live="polite"></section>
      </section>

      <section id="settingsView" class="view hidden">
        <div class="changes-header">
          <button id="backFromSettingsButton" type="button" class="back-arrow" aria-label="Voltar para tela inicial">
            <span class="back-arrow-icon">➜</span>
          </button>
          <h2>Configurações</h2>
        </div>

        <div class="field-group">
          <label for="tokenSelect">Token</label>
          <div class="token-select-row">
            <select id="tokenSelect"></select>
            <button id="addTokenButton" type="button" class="icon-action-button" aria-label="Adicionar token" title="Adicionar token">+</button>
            <button id="deleteTokenButton" type="button" class="icon-action-button delete-button" aria-label="Excluir token" title="Excluir token">🗑</button>
          </div>
        </div>

        <div class="field-group">
          <label for="organizationSelect">Organização</label>
          <select id="organizationSelect"></select>
        </div>

        <div class="field-group">
          <label for="projectSelect">Projeto</label>
          <select id="projectSelect"></select>
        </div>

        <div class="field-group">
          <label for="teamSelect">Time</label>
          <select id="teamSelect"></select>
        </div>

        <div class="field-group">
          <label for="userSelect">Usuário</label>
          <select id="userSelect"></select>
        </div>

        <div class="settings-actions-row">
          <button id="saveSettingsButton" type="button">Salvar configurações</button>
        </div>
        <section id="settingsStatus" class="result hidden" aria-live="polite"></section>
      </section>

      <section id="changesView" class="view hidden">
        <div class="changes-header">
          <button id="backToInitialButton" type="button" class="back-arrow" aria-label="Voltar para tela inicial">
            <span class="back-arrow-icon">➜</span>
          </button>
          <h2 id="changesViewTitle">Alterações desde o último dia útil</h2>
        </div>

        <section id="recentSection" class="recent-section">
          <div id="recentList" class="recent-list">Nenhum item carregado.</div>
        </section>

        <section id="detailSection" class="detail-section hidden">
          <div class="detail-header">
            <div class="detail-title-row">
              <button id="backArrowButton" type="button" class="back-arrow" aria-label="Voltar para a lista">
                <span class="back-arrow-icon">➜</span>
              </button>
              <h2>Detalhes</h2>
            </div>
            <button id="detailOpenLinkButton" type="button" class="external-link-button" aria-label="Abrir item no Azure" title="Abrir item no Azure">
              &#8599;
            </button>
          </div>
          <div id="detailMeta" class="detail-meta"></div>
          <button id="criticalAnalysisButton" type="button" class="critical-analysis-button hidden">Fazer análise crítica</button>
          <div id="detailDescription" class="detail-description"></div>
        </section>
      </section>
    </main>

    <script src="popup/state.js"></script>
    <script src="popup/dom.js"></script>
    <script src="popup/runtime-client.js"></script>
    <script src="popup/renderers.js"></script>
    <script src="popup/app.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
